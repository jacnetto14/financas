name: Cotações diárias

on:
  schedule:
    # 21:30 UTC = 18:30 em Brasília (após o fechamento do pregão da B3).
    # Roda de segunda a sexta.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  fetch-precos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r automation/requirements.txt

      - name: Buscar cotações do dia
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python automation/fetch_precos.py

      - name: Commitar CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add automation/data/precos_historico.csv
          git diff --cached --quiet && echo "Nada novo para commitar" || git commit -m "Atualiza cotações diárias ($(date -u +%Y-%m-%d))"
          git push
